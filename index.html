<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Self-Trust Tracker</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#10b981', dark: '#0f172a', card: '#1e293b' } } }
        }
    </script>

    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-tap-highlight-color: transparent; }
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-dark text-slate-100 min-h-screen font-sans antialiased pb-24">
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyDxZN7QIusq7YwHfFEcNMx447A9nzJkYqA",
            authDomain: "actrandomapp.firebaseapp.com",
            projectId: "actrandomapp",
            storageBucket: "actrandomapp.firebasestorage.app",
            messagingSenderId: "626302954284",
            appId: "1:626302954284:web:f2760bc105cf1545df1a89"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const userDocRef = db.collection('selftrust_users').doc('my_sync_data');

        const generateId = () => Math.random().toString(36).substr(2, 9);
        const getTodayStr = () => new Date().toLocaleDateString('en-CA'); 
        
        const isSameWeek = (dateStr1, dateStr2) => {
            const getMonday = (d) => {
                const date = new Date(d);
                const day = date.getDay() || 7;
                date.setHours(0,0,0,0);
                date.setDate(date.getDate() - day + 1);
                return date.getTime();
            };
            return getMonday(dateStr1) === getMonday(dateStr2);
        };

        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                home: <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />,
                settings: <><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><circle cx="12" cy="12" r="3" /></>,
                sun: <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />,
                chart: <path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />,
                check: <path d="M5 13l4 4L19 7" />,
                skip: <path d="M11.933 12.8a1 1 0 000-1.6L6.6 7.2A1 1 0 005 8v8a1 1 0 001.6.8l5.333-4zM19.933 12.8a1 1 0 000-1.6l-5.333-4A1 1 0 0013 8v8a1 1 0 001.6.8l5.333-4z" />,
                cloud: <path d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" />,
                left: <path d="M15 19l-7-7 7-7" />,
                right: <path d="M9 5l7 7-7 7" />
            };
            return <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" className={className} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">{icons[name]}</svg>;
        };

        function App() {
            const [tab, setTab] = useState('dashboard');
            const [activities, setActivities] = useState([]);
            const [records, setRecords] = useState([]);
            const [reflections, setReflections] = useState([]);
            const [isInitialLoadDone, setIsInitialLoadDone] = useState(false);

            useEffect(() => {
                userDocRef.get().then(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        setActivities(data.activities || []);
                        setRecords(data.records || []);
                        setReflections(data.reflections || []);
                    }
                    setIsInitialLoadDone(true);
                });
            }, []);

            useEffect(() => {
                if (!isInitialLoadDone) return;
                userDocRef.set({ activities, records, reflections });
            }, [activities, records, reflections, isInitialLoadDone]);

            return (
                <div className="max-w-md mx-auto relative min-h-screen border-x border-slate-800 shadow-2xl bg-dark flex flex-col">
                    <header className="pt-6 pb-3 px-6 border-b border-slate-800 bg-dark/80 backdrop-blur sticky top-0 z-30 flex justify-between items-center">
                        <h1 className="text-2xl font-bold bg-gradient-to-r from-emerald-400 to-teal-400 bg-clip-text text-transparent">Self-Trust</h1>
                    </header>
                    <main className="flex-1 p-4 overflow-x-hidden">
                        {isInitialLoadDone ? (
                            <>
                                {tab === 'dashboard' && <Dashboard activities={activities} records={records} setRecords={setRecords} />}
                                {tab === 'settings' && <Settings activities={activities} setActivities={setActivities} />}
                                {tab === 'reflection' && <Reflection reflections={reflections} setReflections={setReflections} />}
                                {tab === 'stats' && <Stats activities={activities} records={records} reflections={reflections} />}
                            </>
                        ) : ( <div className="text-center mt-20 text-slate-500">Connecting...</div> )}
                    </main>
                    <nav className="fixed bottom-0 w-full max-w-md bg-card border-t border-slate-700 flex justify-around py-3 px-2 z-40 pb-safe">
                        {[{id:'dashboard',icon:'home',label:'Wall'},{id:'reflection',icon:'sun',label:'Reflect'},{id:'stats',icon:'chart',label:'Log'},{id:'settings',icon:'settings',label:'Setup'}].map(item => (
                            <button key={item.id} onClick={() => setTab(item.id)} className={"flex flex-col items-center p-2 rounded-xl transition-colors " + (tab === item.id ? "text-primary" : "text-slate-500")}>
                                <Icon name={item.icon} className="w-6 h-6 mb-1" />
                                <span className="text-[10px] font-medium">{item.label}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        }

        function Dashboard({ activities, records, setRecords }) {
            const [selectedDate, setSelectedDate] = useState(getTodayStr());
            const [skipModal, setSkipModal] = useState({ show: false, activityId: null, reason: '' });
            const scrollRef = useRef(null);

            const dateList = useMemo(() => {
                const dates = [];
                for (let i = 0; i < 14; i++) {
                    const d = new Date(); d.setDate(d.getDate() - i);
                    dates.push(d.toLocaleDateString('en-CA'));
                }
                return dates.reverse();
            }, []);

            const dueActivities = useMemo(() => {
                const selDate = new Date(selectedDate);
                const selDay = selDate.getDay();
                return activities.filter(a => !a.archived).filter(a => {
                    if (a.freqType === 'daily') return true;
                    if (a.freqType === 'specific') return a.freqDays.includes(selDay);
                    if (a.freqType === 'weekly') return true; // แสดงกิจกรรมรายสัปดาห์เสมอเพื่อดูสถานะ success
                    return true;
                });
            }, [activities, records, selectedDate]);

            const handleToggle = (activityId, isLocked) => {
                if (isLocked) return; // ล็อคปุ่มหากสำเร็จเป้าหมายสัปดาห์แล้ว
                const existing = records.find(r => r.activityId === activityId && r.date === selectedDate);
                if (existing) {
                    setRecords(records.filter(r => r.id !== existing.id));
                } else {
                    setRecords([...records, { id: generateId(), activityId, date: selectedDate, status: 'completed', timestamp: Date.now() }]);
                }
            };

            return (
                <div className="fade-in space-y-6 pb-10">
                    <div className="bg-card rounded-2xl p-1 border border-slate-700 flex items-center shadow-inner">
                        <button onClick={() => scrollRef.current.scrollBy({left:-150,behavior:'smooth'})} className="p-2 text-slate-500"><Icon name="left" className="w-5 h-5"/></button>
                        <div className="flex-1 flex overflow-x-auto no-scrollbar gap-2 px-1 py-1" ref={scrollRef}>
                            {dateList.map(dateStr => (
                                <button key={dateStr} onClick={() => setSelectedDate(dateStr)} className={"flex-shrink-0 w-12 py-3 rounded-xl flex flex-col items-center " + (selectedDate === dateStr ? "bg-primary text-dark font-bold" : "bg-dark/50 text-slate-400")}>
                                    <span className="text-[10px] uppercase opacity-70">{new Date(dateStr).toLocaleDateString('th-TH',{weekday:'short'})}</span>
                                    <span className="text-base">{new Date(dateStr).getDate()}</span>
                                </button>
                            ))}
                        </div>
                        <button onClick={() => scrollRef.current.scrollBy({left:150,behavior:'smooth'})} className="p-2 text-slate-500"><Icon name="right" className="w-5 h-5"/></button>
                    </div>

                    <div className="space-y-3">
                        {dueActivities.map(activity => {
                            const record = records.find(r => r.activityId === activity.id && r.date === selectedDate);
                            const doneOnDay = record?.status === 'completed';
                            const isSkipped = record?.status === 'skipped';
                            
                            // คำนวณความคืบหน้ารายสัปดาห์
                            let label = "";
                            let isGoalMetThisWeek = false;
                            if (activity.freqType === 'weekly') {
                                const countThisWeek = records.filter(r => r.activityId === activity.id && r.status === 'completed' && isSameWeek(r.date, selectedDate)).length;
                                isGoalMetThisWeek = countThisWeek >= activity.freqCount;
                                
                                if (isGoalMetThisWeek) {
                                    label = `(${activity.freqCount}/${activity.freqCount})`;
                                } else {
                                    // ถ้ายังไม่ทำเลยขึ้น 1/3, ทำแล้ว 1 ครั้งขึ้น 2/3 (ตามเงื่อนไขคุณ)
                                    label = `(${countThisWeek + 1}/${activity.freqCount})`;
                                }
                            }

                            // เงื่อนไขการล็อค: เป้าหมายสัปดาห์ครบแล้ว และ วันนี้ไม่ได้ถูกติ๊กไว้ (ล็อคไม่ให้ติ๊กเพิ่ม)
                            // หรือ ถ้าเป้าหมายครบแล้วแต่เป็นของวันอื่น ปุ่มในวันอื่นๆ จะกดไม่ได้
                            const isLocked = isGoalMetThisWeek && !doneOnDay;
                            const showAsSuccess = isGoalMetThisWeek || doneOnDay;

                            return (
                                <div key={activity.id} className={"p-4 rounded-2xl border transition-all " + (showAsSuccess ? "bg-primary/10 border-primary/30" : isSkipped ? "opacity-50" : "bg-card border-slate-700")}>
                                    <div className="flex items-center justify-between">
                                        <div className="flex items-center gap-4 flex-1">
                                            <button 
                                                onClick={() => handleToggle(activity.id, isLocked)} 
                                                className={"w-9 h-9 rounded-full border-2 flex items-center justify-center " + (doneOnDay ? "bg-primary border-primary text-dark" : isLocked ? "border-slate-700 bg-slate-800 text-slate-600 cursor-not-allowed" : "border-slate-500")}>
                                                {doneOnDay && <Icon name="check" className="w-6 h-6" />}
                                                {isLocked && !doneOnDay && <span className="text-[8px] font-bold">MAX</span>}
                                            </button>
                                            <div className="flex-1">
                                                <h3 className={"font-medium " + (showAsSuccess ? "line-through text-slate-400" : "text-slate-100")}>
                                                    {activity.name} <span className="text-xs ml-1 opacity-70">{label}</span>
                                                </h3>
                                                <p className="text-[10px] text-slate-500 uppercase">{activity.identity}</p>
                                            </div>
                                        </div>
                                        {!showAsSuccess && !isSkipped && (
                                            <button onClick={() => setSkipModal({ show: true, activityId: activity.id, reason: '' })} className="p-2 text-slate-500"><Icon name="skip" className="w-5 h-5" /></button>
                                        )}
                                    </div>
                                </div>
                            )
                        })}
                    </div>

                    {skipModal.show && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-card w-full max-w-sm rounded-3xl p-6 border border-slate-700">
                                <h3 className="text-xl font-bold mb-4">Reason to skip?</h3>
                                <input type="text" className="w-full bg-dark border border-slate-600 rounded-xl p-3 text-white mb-6 outline-none" autoFocus value={skipModal.reason} onChange={(e) => setSkipModal({...skipModal, reason: e.target.value})} />
                                <div className="flex gap-3">
                                    <button onClick={() => setSkipModal({show:false})} className="flex-1 py-3 rounded-xl bg-slate-700">Cancel</button>
                                    <button onClick={() => {
                                        setRecords([...records, { id: generateId(), activityId: skipModal.activityId, date: selectedDate, status: 'skipped', reason: skipModal.reason, timestamp: Date.now() }]);
                                        setSkipModal({show:false});
                                    }} className="flex-1 py-3 rounded-xl bg-orange-500 font-bold">Skip</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Settings({ activities, setActivities }) {
            const [form, setForm] = useState({ name: '', freqType: 'daily', freqDays: [], freqCount: 1, identity: '' });
            const days = [{ id: 1, label: 'จ.' }, { id: 2, label: 'อ.' }, { id: 3, label: 'พ.' }, { id: 4, label: 'พฤ.' }, { id: 5, label: 'ศ.' }, { id: 6, label: 'ส.' }, { id: 0, label: 'อา.' }];
            return (
                <div className="fade-in space-y-6 pb-10">
                    <div className="bg-card p-5 rounded-3xl border border-slate-700">
                        <h2 className="text-lg font-semibold mb-4">Add Habit</h2>
                        <div className="space-y-4">
                            <input type="text" value={form.name} onChange={e => setForm({...form, name: e.target.value})} className="w-full bg-dark border border-slate-600 rounded-xl p-3 text-sm" placeholder="Habit Name" />
                            <input type="text" value={form.identity} onChange={e => setForm({...form, identity: e.target.value})} className="w-full bg-dark border border-slate-600 rounded-xl p-3 text-sm" placeholder="Identity (I am...)" />
                            <div className="flex gap-2">
                                {['daily', 'specific', 'weekly'].map(type => (
                                    <button key={type} onClick={() => setForm({...form, freqType: type})} className={"flex-1 py-2 rounded-lg border text-xs capitalize " + (form.freqType === type ? "bg-primary/20 border-primary text-primary" : "border-slate-600 text-slate-500")}>{type}</button>
                                ))}
                            </div>
                            {form.freqType === 'weekly' && <input type="number" min="1" max="7" value={form.freqCount} onChange={e => setForm({...form, freqCount: parseInt(e.target.value)})} className="w-full bg-dark border border-slate-600 rounded-xl p-3 text-sm" placeholder="Times per week" />}
                            <button onClick={() => { if(form.name) { setActivities([...activities, {...form, id:generateId(), archived:false}]); setForm({name:'',freqType:'daily',freqDays:[],freqCount:1,identity:''}); } }} className="w-full bg-primary text-dark font-bold py-3 rounded-xl">Save</button>
                        </div>
                    </div>
                    {activities.filter(a=>!a.archived).map(a => (
                        <div key={a.id} className="p-4 bg-card rounded-xl border border-slate-700 flex justify-between items-center text-sm">
                            <span>{a.name} ({a.freqType})</span>
                            <button onClick={() => setActivities(activities.map(x=>x.id===a.id?{...x,archived:true}:x))}><Icon name="archive" className="w-5 h-5 text-slate-500"/></button>
                        </div>
                    ))}
                </div>
            );
        }

        function Reflection({ reflections, setReflections }) {
            const [score, setScore] = useState(0);
            return (
                <div className="fade-in p-6 bg-gradient-to-br from-blue-900/40 to-indigo-900/40 rounded-3xl border border-blue-800/30">
                    <h2 className="text-xl font-bold mb-6">Sunday Reflection</h2>
                    <div className="flex gap-2 justify-center mb-10">
                        {[1,2,3,4,5].map(s => (
                            <button key={s} onClick={() => setScore(s)} className={"w-12 h-12 rounded-full font-bold " + (score === s ? "bg-blue-500" : "bg-slate-800 text-slate-500")}>{s}</button>
                        ))}
                    </div>
                    <button onClick={() => { if(score) { setReflections([{id:generateId(), date:getTodayStr(), identityScore:score}, ...reflections]); setScore(0); alert('Saved!'); } }} className="w-full bg-blue-600 font-bold py-4 rounded-xl shadow-lg">Save Reflection</button>
                </div>
            );
        }

        function Stats({ activities, records, reflections }) {
            const allDates = [...new Set([...records.map(r => r.date), ...reflections.map(r => r.date)])].sort((a,b) => new Date(b) - new Date(a));
            return (
                <div className="fade-in space-y-4 pb-20">
                    {allDates.map(date => (
                        <div key={date} className="bg-card p-4 rounded-2xl border border-slate-700">
                            <h3 className="text-emerald-400 font-bold text-xs mb-2">{new Date(date).toLocaleDateString('th-TH',{dateStyle:'medium'})}</h3>
                            {records.filter(r => r.date === date).map(r => (
                                <div key={r.id} className="text-sm text-slate-300 flex gap-2">
                                    <span>{r.status === 'completed' ? '✅' : '⏭️'}</span>
                                    <span>{activities.find(a=>a.id===r.activityId)?.name}</span>
                                </div>
                            ))}
                        </div>
                    ))}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>

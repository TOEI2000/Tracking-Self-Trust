<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Self-Trust Tracker</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#10b981', dark: '#0f172a', card: '#1e293b' } } } }
    </script>

    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <!-- Google Calendar API & Identity Services -->
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>

    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-tap-highlight-color: transparent; }
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-dark text-slate-100 min-h-screen font-sans antialiased pb-24">
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo, useRef } = React;

        // ==========================================
        // 🔴 ใส่ API_KEY และ CLIENT_ID ของ Google ตรงนี้
        // ==========================================
        const GOOGLE_API_KEY = 'AIzaSyCEmK_M3NoqB4f7QnBkngHbSnwqqdiJ9_g';     // ใส่_API_KEY_ของ_GOOGLE_ที่นี่
        const GOOGLE_CLIENT_ID = '453374156787-9abfn8pq5doa4nb3pb1eh0fpto41qdmv.apps.googleusercontent.com'; // ใส่_CLIENT_ID_ของ_GOOGLE_ที่นี่
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/calendar.events';

        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyDxZN7QIusq7YwHfFEcNMx447A9nzJkYqA",
            authDomain: "actrandomapp.firebaseapp.com",
            projectId: "actrandomapp",
            storageBucket: "actrandomapp.firebasestorage.app",
            messagingSenderId: "626302954284",
            appId: "1:626302954284:web:f2760bc105cf1545df1a89"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const userDocRef = db.collection('selftrust_users').doc('my_sync_data');

        // --- Helpers ---
        const generateId = () => Math.random().toString(36).substr(2, 9);
        const getTodayStr = () => new Date().toLocaleDateString('en-CA'); 
        const getMondayTime = (dateStr) => { const date = new Date(dateStr); const day = date.getDay() || 7; date.setHours(0,0,0,0); date.setDate(date.getDate() - day + 1); return date.getTime(); };
        const isSameWeek = (d1, d2) => getMondayTime(d1) === getMondayTime(d2);

        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                home: <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />,
                settings: <><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><circle cx="12" cy="12" r="3" /></>,
                sun: <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />,
                chart: <path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />,
                check: <path d="M5 13l4 4L19 7" />,
                skip: <path d="M11.933 12.8a1 1 0 000-1.6L6.6 7.2A1 1 0 005 8v8a1 1 0 001.6.8l5.333-4zM19.933 12.8a1 1 0 000-1.6l-5.333-4A1 1 0 0013 8v8a1 1 0 001.6.8l5.333-4z" />,
                left: <path d="M15 19l-7-7 7-7" />,
                right: <path d="M9 5l7 7-7 7" />,
                calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><path d="M16 2v4M8 2v4M3 10h18" /></>
            };
            return <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" className={className} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">{icons[name] || icons.home}</svg>;
        };

        function App() {
            const [tab, setTab] = useState('dashboard');
            const [activities, setActivities] = useState([]);
            const [records, setRecords] = useState([]);
            const [reflections, setReflections] = useState([]);
            const [isInitialLoadDone, setIsInitialLoadDone] = useState(false);

            // Google API State
            const [isGapiLoaded, setIsGapiLoaded] = useState(false);
            const [tokenClient, setTokenClient] = useState(null);
            const [isCalAuthorized, setIsCalAuthorized] = useState(false);

            // โหลด Firebase
            useEffect(() => {
                userDocRef.get().then(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        setActivities(data.activities || []);
                        setRecords(data.records || []);
                        setReflections(data.reflections || []);
                    }
                    setIsInitialLoadDone(true);
                });
            }, []);

            useEffect(() => {
                if (!isInitialLoadDone) return;
                userDocRef.set({ activities, records, reflections });
            }, [activities, records, reflections, isInitialLoadDone]);

            // โหลด Google API
            useEffect(() => {
                const initGapi = () => {
                    gapi.client.init({ apiKey: GOOGLE_API_KEY, discoveryDocs: [DISCOVERY_DOC] })
                        .then(() => setIsGapiLoaded(true))
                        .catch(err => console.error("GAPI Error", err));
                };

                if (window.gapi && window.google) {
                    gapi.load('client', initGapi);
                    const client = google.accounts.oauth2.initTokenClient({
                        client_id: GOOGLE_CLIENT_ID,
                        scope: SCOPES,
                        callback: (resp) => {
                            if (resp.error) { console.error(resp); return; }
                            setIsCalAuthorized(true);
                        },
                    });
                    setTokenClient(client);
                }
            }, []);

            const handleAuthClick = () => {
                if (tokenClient) {
                    if (gapi.client.getToken() === null) {
                        tokenClient.requestAccessToken({prompt: 'consent'});
                    } else {
                        tokenClient.requestAccessToken({prompt: ''});
                    }
                }
            };

            const handleSignoutClick = () => {
                const token = gapi.client.getToken();
                if (token !== null) {
                    google.accounts.oauth2.revoke(token.access_token, () => {
                        gapi.client.setToken('');
                        setIsCalAuthorized(false);
                    });
                }
            };

            // ฟังก์ชันเพิ่ม Event ลง Calendar
            const addEventToCalendar = async (activityName) => {
                if (!isCalAuthorized) return; // ถ้าไม่ได้ล็อกอิน ไม่ต้องทำอะไร
                
                const event = {
                    'summary': `✅ ${activityName}`,
                    'description': 'สร้างจาก Self-Trust App',
                    'start': { 'dateTime': new Date().toISOString(), 'timeZone': 'Asia/Bangkok' },
                    // ให้กิจกรรมใช้เวลา 30 นาที
                    'end': { 'dateTime': new Date(new Date().getTime() + 30*60000).toISOString(), 'timeZone': 'Asia/Bangkok' },
                };

                try {
                    await gapi.client.calendar.events.insert({
                        'calendarId': 'primary',
                        'resource': event,
                    });
                    console.log("บันทึกลง Calendar สำเร็จ!");
                } catch (err) {
                    console.error("Calendar Insert Error: ", err);
                }
            };

            return (
                <div className="max-w-md mx-auto relative min-h-screen border-x border-slate-800 shadow-2xl bg-dark flex flex-col">
                    <header className="pt-6 pb-3 px-6 border-b border-slate-800 bg-dark/80 backdrop-blur sticky top-0 z-30">
                        <h1 className="text-2xl font-bold bg-gradient-to-r from-emerald-400 to-teal-400 bg-clip-text text-transparent text-center">Self-Trust</h1>
                    </header>
                    <main className="flex-1 p-4 overflow-x-hidden">
                        {isInitialLoadDone ? (
                            <>
                                {tab === 'dashboard' && <Dashboard activities={activities} records={records} setRecords={setRecords} addEventToCalendar={addEventToCalendar} />}
                                {tab === 'settings' && <Settings activities={activities} setActivities={setActivities} isCalAuthorized={isCalAuthorized} handleAuthClick={handleAuthClick} handleSignoutClick={handleSignoutClick} />}
                                {tab === 'reflection' && <Reflection reflections={reflections} setReflections={setReflections} />}
                                {tab === 'stats' && <Stats activities={activities} records={records} reflections={reflections} />}
                            </>
                        ) : ( <div className="text-center mt-20 text-slate-500">Syncing...</div> )}
                    </main>
                    <nav className="fixed bottom-0 w-full max-w-md bg-card border-t border-slate-700 flex justify-around py-3 px-2 z-40 pb-safe">
                        {[{id:'dashboard',icon:'home',label:'Wall'},{id:'reflection',icon:'sun',label:'Reflect'},{id:'stats',icon:'chart',label:'Log'},{id:'settings',icon:'settings',label:'Setup'}].map(item => (
                            <button key={item.id} onClick={() => setTab(item.id)} className={"flex flex-col items-center p-2 rounded-xl transition-colors " + (tab === item.id ? "text-primary" : "text-slate-500")}>
                                <Icon name={item.icon} className="w-6 h-6 mb-1" />
                                <span className="text-[10px] font-medium">{item.label}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        }

        function Dashboard({ activities, records, setRecords, addEventToCalendar }) {
            const [selectedDate, setSelectedDate] = useState(getTodayStr());
            const [skipModal, setSkipModal] = useState({ show: false, activityId: null, reason: '' });
            const scrollRef = useRef(null);

            const dateList = useMemo(() => {
                const dates = [];
                for (let i = 0; i < 14; i++) {
                    const d = new Date(); d.setDate(d.getDate() - i);
                    dates.push(d.toLocaleDateString('en-CA'));
                }
                return dates.reverse();
            }, []);

            const dueActivities = useMemo(() => {
                const selDate = new Date(selectedDate);
                const selDay = selDate.getDay();
                return activities.filter(a => !a.archived).filter(a => {
                    if (a.freqType === 'daily') return true;
                    if (a.freqType === 'specific') return a.freqDays.includes(selDay);
                    if (a.freqType === 'weekly') return true;
                    return true;
                });
            }, [activities, selectedDate]);

            const handleToggle = (activity, isLocked) => {
                if (isLocked) return;
                const existing = records.find(r => r.activityId === activity.id && r.date === selectedDate);
                if (existing) {
                    setRecords(records.filter(r => r.id !== existing.id));
                } else {
                    setRecords([...records, { id: generateId(), activityId: activity.id, date: selectedDate, status: 'completed', timestamp: Date.now() }]);
                    // ยิง Event ไป Calendar เมื่อกด Completed (ยิงเฉพาะวันที่กดของ "วันนี้" เท่านั้นเพื่อไม่ให้ตารางย้อนหลังเพี้ยน)
                    if (selectedDate === getTodayStr()) {
                        addEventToCalendar(activity.name);
                    }
                }
            };

            return (
                <div className="fade-in space-y-6 pb-10">
                    <div className="bg-card rounded-2xl p-1 border border-slate-700 flex items-center shadow-inner">
                        <button onClick={() => scrollRef.current.scrollBy({left:-150,behavior:'smooth'})} className="p-2 text-slate-500"><Icon name="left" className="w-5 h-5"/></button>
                        <div className="flex-1 flex overflow-x-auto no-scrollbar gap-2 px-1 py-1" ref={scrollRef}>
                            {dateList.map(dateStr => (
                                <button key={dateStr} onClick={() => setSelectedDate(dateStr)} className={"flex-shrink-0 w-12 py-3 rounded-xl flex flex-col items-center " + (selectedDate === dateStr ? "bg-primary text-dark font-bold" : "bg-dark/50 text-slate-400")}>
                                    <span className="text-[10px] uppercase opacity-70">{new Date(dateStr).toLocaleDateString('th-TH',{weekday:'short'})}</span>
                                    <span className="text-base">{new Date(dateStr).getDate()}</span>
                                </button>
                            ))}
                        </div>
                        <button onClick={() => scrollRef.current.scrollBy({left:150,behavior:'smooth'})} className="p-2 text-slate-500"><Icon name="right" className="w-5 h-5"/></button>
                    </div>

                    <div className="space-y-3">
                        {dueActivities.map(activity => {
                            const recordOnDay = records.find(r => r.activityId === activity.id && r.date === selectedDate);
                            const doneToday = recordOnDay?.status === 'completed';
                            const isSkipped = recordOnDay?.status === 'skipped';
                            
                            const totalDoneThisWeek = records.filter(r => r.activityId === activity.id && r.status === 'completed' && isSameWeek(r.date, selectedDate)).length;

                            let label = "";
                            let isGoalMet = false;

                            if (activity.freqType === 'weekly') {
                                isGoalMet = totalDoneThisWeek >= activity.freqCount;
                                if (isGoalMet) {
                                    label = `(${activity.freqCount}/${activity.freqCount})`;
                                } else {
                                    label = `(${doneToday ? totalDoneThisWeek : totalDoneThisWeek + 1}/${activity.freqCount})`;
                                }
                            }

                            const isLocked = isGoalMet && !doneToday;
                            const shouldStrike = isGoalMet || doneToday;

                            return (
                                <div key={activity.id} className={"p-4 rounded-2xl border transition-all " + (shouldStrike ? "bg-primary/10 border-primary/30" : isSkipped ? "opacity-50" : "bg-card border-slate-700")}>
                                    <div className="flex items-center justify-between">
                                        <div className="flex items-center gap-4 flex-1">
                                            <button 
                                                onClick={() => handleToggle(activity, isLocked)} 
                                                className={"w-9 h-9 rounded-full border-2 flex items-center justify-center " + (doneToday ? "bg-primary border-primary text-dark" : isLocked ? "border-slate-800 bg-slate-800 text-slate-600 cursor-not-allowed" : "border-slate-500")}>
                                                {doneToday && <Icon name="check" className="w-6 h-6" />}
                                                {isLocked && <span className="text-[8px] font-bold">DONE</span>}
                                            </button>
                                            <div className="flex-1">
                                                <h3 className={"font-medium " + (shouldStrike ? "line-through text-slate-400" : "text-slate-100")}>
                                                    {activity.name} <span className="text-xs ml-1 font-mono opacity-80">{label}</span>
                                                </h3>
                                                <p className="text-[10px] text-slate-500 uppercase tracking-wider">{activity.identity}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )
                        })}
                    </div>
                </div>
            );
        }

        function Settings({ activities, setActivities, isCalAuthorized, handleAuthClick, handleSignoutClick }) {
            const [form, setForm] = useState({ name: '', freqType: 'daily', freqDays: [], freqCount: 1, identity: '' });
            const days = [{ id: 1, label: 'จ.' }, { id: 2, label: 'อ.' }, { id: 3, label: 'พ.' }, { id: 4, label: 'พฤ.' }, { id: 5, label: 'ศ.' }, { id: 6, label: 'ส.' }, { id: 0, label: 'อา.' }];
            return (
                <div className="fade-in space-y-6 pb-10">
                    {/* Google Calendar Connect Section */}
                    <div className="bg-gradient-to-r from-blue-900/30 to-indigo-900/30 p-5 rounded-3xl border border-blue-800/50 flex flex-col items-center justify-center text-center">
                        <Icon name="calendar" className="w-8 h-8 text-blue-400 mb-2" />
                        <h2 className="text-lg font-semibold text-slate-200">Google Calendar API</h2>
                        <p className="text-xs text-slate-400 mb-4">ส่งประวัติการทำกิจกรรมไปลงปฏิทินอัตโนมัติ</p>
                        
                        {!isCalAuthorized ? (
                            <button onClick={handleAuthClick} className="bg-white text-slate-900 px-6 py-2 rounded-full text-sm font-bold shadow-lg flex items-center gap-2">
                                เชื่อมต่อบัญชี Google
                            </button>
                        ) : (
                            <div className="flex flex-col items-center">
                                <span className="text-emerald-400 text-sm font-medium mb-3 flex items-center gap-1">✅ เชื่อมต่อเรียบร้อยแล้ว</span>
                                <button onClick={handleSignoutClick} className="bg-slate-800 text-slate-400 px-4 py-1.5 rounded-full text-xs hover:text-white border border-slate-700">
                                    ยกเลิกการเชื่อมต่อ
                                </button>
                            </div>
                        )}
                    </div>

                    <div className="bg-card p-5 rounded-3xl border border-slate-700">
                        <h2 className="text-lg font-semibold mb-4">ตั้งค่ากิจกรรม</h2>
                        <div className="space-y-4">
                            <input type="text" value={form.name} onChange={e => setForm({...form, name: e.target.value})} className="w-full bg-dark border border-slate-600 rounded-xl p-3 text-sm" placeholder="ชื่อกิจกรรม" />
                            <input type="text" value={form.identity} onChange={e => setForm({...form, identity: e.target.value})} className="w-full bg-dark border border-slate-600 rounded-xl p-3 text-sm" placeholder="Identity Label (ฉันคือ...)" />
                            <div className="flex gap-2">
                                {['daily', 'specific', 'weekly'].map(type => (
                                    <button key={type} onClick={() => setForm({...form, freqType: type})} className={"flex-1 py-2 rounded-lg border text-xs capitalize " + (form.freqType === type ? "bg-primary/20 border-primary text-primary" : "border-slate-600 text-slate-500")}>{type}</button>
                                ))}
                            </div>
                            {form.freqType === 'weekly' && <input type="number" min="1" max="7" value={form.freqCount} onChange={e => setForm({...form, freqCount: parseInt(e.target.value)})} className="w-full bg-dark border border-slate-600 rounded-xl p-3 text-sm" placeholder="จำนวนครั้งต่อสัปดาห์" />}
                            <button onClick={() => { if(form.name) { setActivities([...activities, {...form, id:generateId(), archived:false}]); setForm({name:'',freqType:'daily',freqDays:[],freqCount:1,identity:''}); } }} className="w-full bg-primary text-dark font-bold py-3 rounded-xl">เพิ่มกิจกรรม</button>
                        </div>
                    </div>
                    {activities.filter(a=>!a.archived).map(a => (
                        <div key={a.id} className="p-4 bg-card rounded-xl border border-slate-700 flex justify-between items-center text-sm shadow-sm">
                            <div className="flex flex-col">
                                <span className="font-bold">{a.name}</span>
                                <span className="text-[10px] text-slate-500">{a.freqType} {a.freqType==='weekly' && `(${a.freqCount} ครั้ง/สัปดาห์)`}</span>
                            </div>
                            <button onClick={() => setActivities(activities.map(x=>x.id===a.id?{...x,archived:true}:x))} className="p-2 text-slate-500 hover:text-red-400">ลบ</button>
                        </div>
                    ))}
                </div>
            );
        }

        // --- ส่วน Reflection และ Stats เหมือนเดิม ---
        function Reflection({ reflections, setReflections }) {
            const [score, setScore] = useState(0);
            return (
                <div className="fade-in p-6 bg-card rounded-3xl border border-slate-700 shadow-xl">
                    <h2 className="text-xl font-bold mb-6 text-center text-emerald-400">Sunday Reflection</h2>
                    <div className="flex gap-3 justify-center mb-10">
                        {[1,2,3,4,5].map(s => (
                            <button key={s} onClick={() => setScore(s)} className={"w-12 h-12 rounded-full font-bold transition-all " + (score === s ? "bg-primary text-dark shadow-lg scale-110" : "bg-slate-800 text-slate-500")}>{s}</button>
                        ))}
                    </div>
                    <button onClick={() => { if(score) { setReflections([{id:generateId(), date:getTodayStr(), identityScore:score}, ...reflections]); setScore(0); alert('บันทึกเรียบร้อย!'); } }} className="w-full bg-primary text-dark font-bold py-4 rounded-xl shadow-lg hover:opacity-90">บันทึกผลสะท้อนตนเอง</button>
                </div>
            );
        }

        function Stats({ activities, records, reflections }) {
            const allDates = [...new Set([...records.map(r => r.date), ...reflections.map(r => r.date)])].sort((a,b) => new Date(b) - new Date(a));
            return (
                <div className="fade-in space-y-4 pb-20">
                    {allDates.map(date => (
                        <div key={date} className="bg-card p-4 rounded-2xl border border-slate-700 shadow-md">
                            <h3 className="text-primary font-bold text-xs mb-3 border-b border-slate-800 pb-2">{new Date(date).toLocaleDateString('th-TH',{dateStyle:'medium'})}</h3>
                            <div className="space-y-1">
                                {records.filter(r => r.date === date).map(r => (
                                    <div key={r.id} className="text-sm text-slate-300 flex items-center gap-2">
                                        <span className="text-[10px]">{r.status === 'completed' ? '✅' : '⏭️'}</span>
                                        <span>{activities.find(a=>a.id===r.activityId)?.name}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ))}
                    {allDates.length === 0 && <div className="text-center text-slate-600 mt-20">ยังไม่มีข้อมูลในระบบ</div>}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

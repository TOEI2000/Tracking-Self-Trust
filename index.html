<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Self-Trust Tracker</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#10b981', dark: '#0f172a', card: '#1e293b' } } }
        }
    </script>

    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>

    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        body { -webkit-tap-highlight-color: transparent; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-dark text-slate-100 min-h-screen font-sans antialiased pb-20">
    <div id="root"></div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const root = document.getElementById('root');
                if (!root || root.innerHTML.trim() === '') {
                    root.innerHTML = '<div class="text-white text-center mt-20 p-6 border border-red-500 rounded-2xl bg-red-900/30 mx-4"><h2 class="text-xl font-bold mb-2">🚨 โหลดแอปไม่สำเร็จ</h2><p class="text-sm text-slate-300">กรุณา Refresh หน้าเว็บหนึ่งครั้ง</p></div>';
                }
            }, 3000);
        });
    </script>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo } = React;

        // --- Helper Functions ---
        const generateId = () => Math.random().toString(36).substr(2, 9);
        const getTodayStr = () => new Date().toISOString().split('T')[0];
        
        // ฟังก์ชันเช็คว่า 2 วันที่อยู่ใน "สัปดาห์เดียวกัน" หรือไม่ (จันทร์-อาทิตย์)
        const isSameWeek = (dateStr1, dateStr2) => {
            if (!dateStr1 || !dateStr2) return false;
            const getMonday = (d) => {
                const date = new Date(d);
                const day = date.getDay() || 7; // ให้วันอาทิตย์มีค่าเป็น 7
                date.setHours(0,0,0,0);
                date.setDate(date.getDate() - day + 1);
                return date.getTime();
            };
            return getMonday(dateStr1) === getMonday(dateStr2);
        };
        
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                home: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />,
                settings: <><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><circle cx="12" cy="12" r="3" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" /></>,
                sun: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />,
                chart: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />,
                check: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />,
                skip: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11.933 12.8a1 1 0 000-1.6L6.6 7.2A1 1 0 005 8v8a1 1 0 001.6.8l5.333-4zM19.933 12.8a1 1 0 000-1.6l-5.333-4A1 1 0 0013 8v8a1 1 0 001.6.8l5.333-4z" />,
                archive: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" />
            };
            return <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" className={className}>{icons[name]}</svg>;
        };

        function App() {
            const [tab, setTab] = useState('dashboard');
            const [activities, setActivities] = useState([]);
            const [records, setRecords] = useState([]);
            const [reflections, setReflections] = useState([]);

            useEffect(() => {
                try {
                    setActivities(JSON.parse(localStorage.getItem('st_activities') || '[]'));
                    setRecords(JSON.parse(localStorage.getItem('st_records') || '[]'));
                    setReflections(JSON.parse(localStorage.getItem('st_reflections') || '[]'));
                } catch(e) { console.error("Storage load error", e); }
            }, []);

            useEffect(() => { localStorage.setItem('st_activities', JSON.stringify(activities)); }, [activities]);
            useEffect(() => { localStorage.setItem('st_records', JSON.stringify(records)); }, [records]);
            useEffect(() => { localStorage.setItem('st_reflections', JSON.stringify(reflections)); }, [reflections]);

            return (
                <div className="max-w-md mx-auto relative min-h-screen border-x border-slate-800 shadow-2xl bg-dark">
                    <header className="pt-8 pb-4 px-6 border-b border-slate-800 bg-dark/80 backdrop-blur sticky top-0 z-10">
                        <h1 className="text-2xl font-bold bg-gradient-to-r from-emerald-400 to-teal-400 bg-clip-text text-transparent">
                            Self-Trust
                        </h1>
                        <p className="text-sm text-slate-400 mt-1">The Evidence Wall</p>
                    </header>

                    <main className="p-6">
                        {tab === 'dashboard' && <Dashboard activities={activities} records={records} setRecords={setRecords} />}
                        {tab === 'settings' && <Settings activities={activities} setActivities={setActivities} />}
                        {tab === 'reflection' && <Reflection reflections={reflections} setReflections={setReflections} />}
                        {tab === 'stats' && <Stats activities={activities} records={records} reflections={reflections} />}
                    </main>

                    <nav className="fixed bottom-0 w-full max-w-md bg-card border-t border-slate-700 flex justify-around py-3 px-2 z-20">
                        {[
                            { id: 'dashboard', icon: 'home', label: 'Home' },
                            { id: 'reflection', icon: 'sun', label: 'Reflect' },
                            { id: 'stats', icon: 'chart', label: 'Stats & Hist' },
                            { id: 'settings', icon: 'settings', label: 'Config' }
                        ].map(item => (
                            <button 
                                key={item.id} 
                                onClick={() => setTab(item.id)}
                                className={`flex
